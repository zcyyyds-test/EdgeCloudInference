# Prometheus configuration for EdgeRouter monitoring.
# Usage: prometheus --config.file=monitoring/prometheus.yml

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "edgerouter"
    static_configs:
      - targets: ["localhost:8080"]
    metrics_path: "/metrics"
    scrape_interval: 5s

  - job_name: "edgerouter-grpc"
    static_configs:
      - targets: ["localhost:50051"]
    metrics_path: "/metrics"
    scrape_interval: 10s
